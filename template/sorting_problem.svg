<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 500" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-sort" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-sort { stroke-width: 4px; rx: 12px; }
      .symbol-text-sort { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-sort { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-sort { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-sort { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-sort { fill: none; stroke: #212E53; stroke-width: 4px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-sort); opacity: 0.6; }
      .annotation-sort { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .badge-circle { fill: #FF6B6B; stroke: #212E53; stroke-width: 3px; }
      .badge-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #FFFFFF; text-anchor: middle; }
    </style>
  </defs>

  <rect width="950" height="500" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-sort">t=1</text>
  <text x="405" y="40" class="time-text-sort">t=2</text>
  <text x="495" y="40" class="time-text-sort">t=3</text>
  <text x="585" y="40" class="time-text-sort">t=4</text>
  <text x="675" y="40" class="time-text-sort">t=5</text>
  <text x="765" y="40" class="time-text-sort">t=6</text>
  <text x="855" y="40" class="time-text-sort">t=7</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-sort">Input Sequence</text>
  <text x="240" y="190" class="label-sub-sort">X (Symbol + Position)</text>
  <text x="240" y="325" class="label-main-sort">Target Sequence</text>
  <text x="240" y="360" class="label-sub-sort">Y (Sorted Symbols)</text>

  <!-- TOP ANNOTATIONS -->
  <path d="M 280 100 L 280 85 L 530 85 L 530 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="405" y="75" class="annotation-sort">Unsorted Items</text>

  <path d="M 550 100 L 550 85 L 620 85 L 620 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="585" y="75" class="annotation-sort">Trigger</text>

  <!-- INPUT SEQUENCE (X) -->
  <g transform="translate(0, 130)">
    <!-- B: Saumon (Pos 3) -->
    <rect x="280" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-sort" />
    <text x="315" y="46" class="symbol-text-sort">B</text>
    <!-- Bulle Position -->
    <circle cx="315" cy="-22" r="16" class="badge-circle" />
    <text x="315" y="-15" class="badge-text">3</text>
    
    <!-- C: Sauge (Pos 1) -->
    <rect x="370" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-sort" />
    <text x="405" y="46" class="symbol-text-sort">C</text>
    <!-- Bulle Position -->
    <circle cx="405" cy="-22" r="16" class="badge-circle" />
    <text x="405" y="-15" class="badge-text">1</text>

    <!-- A: Bleu (Pos 2) -->
    <rect x="460" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-sort" />
    <text x="495" y="46" class="symbol-text-sort">A</text>
    <!-- Bulle Position -->
    <circle cx="495" cy="-22" r="16" class="badge-circle" />
    <text x="495" y="-15" class="badge-text">2</text>
    
    <!-- TRIGGER T -->
    <rect x="550" y="0" width="70" height="70" fill="#ecf29a" stroke="#c9cc88" class="box-sort" />
    <text x="585" y="46" class="symbol-text-sort" fill="#212E53">T</text>
    
    <!-- PADDING (0) pendant la prédiction -->
    <rect x="640" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-sort" stroke-dasharray="8 4" />
    <text x="675" y="46" class="symbol-text-sort" fill="#8CACD3">0</text>
    
    <rect x="730" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-sort" stroke-dasharray="8 4" />
    <text x="765" y="46" class="symbol-text-sort" fill="#8CACD3">0</text>
    
    <rect x="820" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-sort" stroke-dasharray="8 4" />
    <text x="855" y="46" class="symbol-text-sort" fill="#8CACD3">0</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 300)">
    <!-- 0 (Not evaluated / Pending) -->
    <g opacity="0.4">
      <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-sort" stroke-dasharray="8 4"/>
      <text x="315" y="46" class="symbol-text-sort">0</text>
      
      <rect x="370" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-sort" stroke-dasharray="8 4"/>
      <text x="405" y="46" class="symbol-text-sort">0</text>
      
      <rect x="460" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-sort" stroke-dasharray="8 4"/>
      <text x="495" y="46" class="symbol-text-sort">0</text>

      <rect x="550" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-sort" stroke-dasharray="8 4"/>
      <text x="585" y="46" class="symbol-text-sort">0</text>
    </g>

    <!-- C: Sauge (EVALUATED - Pos 1) -->
    <rect x="640" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-sort" stroke-width="5"/>
    <text x="675" y="46" class="symbol-text-sort">C</text>

    <!-- A: Bleu (EVALUATED - Pos 2) -->
    <rect x="730" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-sort" stroke-width="5"/>
    <text x="765" y="46" class="symbol-text-sort">A</text>

    <!-- B: Saumon (EVALUATED - Pos 3) -->
    <rect x="820" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-sort" stroke-width="5"/>
    <text x="855" y="46" class="symbol-text-sort">B</text>
  </g>

  <!-- CONNECTIONS (Showing the sorting mechanism with crossing curves) -->
  <!-- C (Pos 1) goes to first slot after trigger -->
  <path d="M 405 210 C 405 285, 675 240, 675 285" class="connection-sort" />
  
  <!-- A (Pos 2) goes to second slot -->
  <path d="M 495 210 C 495 255, 765 180, 765 285" class="connection-sort" />
  
  <!-- B (Pos 3) goes to third slot -->
  <path d="M 315 210 C 315 260, 855 205, 855 285" class="connection-sort" />

  <!-- ANNOTATIONS -->
  <path d="M 640 390 L 640 405 L 890 405 L 890 390" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="765" y="440" class="annotation-sort">Evaluation (Sorted Output)</text>

</svg>
