<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 500" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-add" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-add { stroke-width: 4px; rx: 12px; }
      .symbol-text-add { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-add { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-add { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-add { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-add { fill: none; stroke: #212E53; stroke-width: 4px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-add); opacity: 0.6; }
      .annotation-add { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .marker-flag { fill: #FF6B6B; stroke: #212E53; stroke-width: 2px; }
    </style>
  </defs>

  <rect width="1050" height="500" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-add">t=1</text>
  <text x="405" y="40" class="time-text-add">t=2</text>
  <text x="495" y="40" class="time-text-add">t=3</text>
  <text x="585" y="40" class="time-text-add">t=4</text>
  <text x="675" y="40" class="time-text-add">t=5</text>
  <text x="765" y="40" class="time-text-add">t=6</text>
  <text x="855" y="40" class="time-text-add">t=7</text>
  <text x="945" y="40" class="time-text-add">t=8</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-add">Input Sequence</text>
  <text x="240" y="190" class="label-sub-add">X (Numbers + Markers)</text>
  <text x="240" y="325" class="label-main-add">Target Sequence</text>
  <text x="240" y="360" class="label-sub-add">Y (Sum)</text>

  <!-- TOP ANNOTATIONS -->
  <path d="M 280 100 L 280 85 L 800 85 L 800 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="540" y="75" class="annotation-add">Sequence of Numbers (Two Marked)</text>

  <path d="M 820 100 L 820 85 L 890 85 L 890 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="855" y="75" class="annotation-add">Trigger</text>

  <!-- INPUT SEQUENCE (X) -->
  <g transform="translate(0, 115)">
    <!-- 4: Bleu -->
    <rect x="280" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-add" />
    <text x="315" y="46" class="symbol-text-add">4</text>
    
    <!-- 7: Saumon + MARKER -->
    <rect x="370" y="0" width="70" height="70" fill="#EBACA2" stroke="#212E53" class="box-add" stroke-width="5"/>
    <text x="405" y="46" class="symbol-text-add">7</text>
    <circle cx="405" cy="-15" r="8" class="marker-flag" />

    <!-- 2: Sauge -->
    <rect x="460" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-add" />
    <text x="495" y="46" class="symbol-text-add">2</text>

    <!-- 8: Bleu clair (réutilisé) -->
    <rect x="550" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-add" />
    <text x="585" y="46" class="symbol-text-add">8</text>
    
    <!-- 5: Lavande + MARKER -->
    <rect x="640" y="0" width="70" height="70" fill="#AFA4CE" stroke="#212E53" class="box-add" stroke-width="5"/>
    <text x="675" y="46" class="symbol-text-add">5</text>
    <circle cx="675" cy="-15" r="8" class="marker-flag" />

    <!-- 1: Sauge -->
    <rect x="730" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-add" />
    <text x="765" y="46" class="symbol-text-add">1</text>
    
    <!-- TRIGGER T: (Nouvelle couleur) -->
    <rect x="820" y="0" width="70" height="70" fill="#ecf29a" stroke="#c9cc88" class="box-add" />
    <text x="855" y="46" class="symbol-text-add" fill="#212E53">T</text>
    
    <!-- PADDING (0) au moment de la prédiction -->
    <rect x="910" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-add" stroke-dasharray="8 4" />
    <text x="945" y="46" class="symbol-text-add" fill="#8CACD3">0</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 285)">
    <!-- 0 (Not evaluated) -->
    <g opacity="0.4">
      <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-add" stroke-dasharray="8 4"/>
      <text x="315" y="46" class="symbol-text-add">0</text>
      
      <rect x="370" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-add" stroke-dasharray="8 4"/>
      <text x="405" y="46" class="symbol-text-add">0</text>
      
      <rect x="460" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-add" stroke-dasharray="8 4"/>
      <text x="495" y="46" class="symbol-text-add">0</text>
      
      <rect x="550" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-add" stroke-dasharray="8 4"/>
      <text x="585" y="46" class="symbol-text-add">0</text>
      
      <rect x="640" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-add" stroke-dasharray="8 4"/>
      <text x="675" y="46" class="symbol-text-add">0</text>
      
      <rect x="730" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-add" stroke-dasharray="8 4"/>
      <text x="765" y="46" class="symbol-text-add">0</text>

      <rect x="820" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-add" stroke-dasharray="8 4"/>
      <text x="855" y="46" class="symbol-text-add">0</text>
    </g>

    <!-- 12: Somme (EVALUATED) -->
    <rect x="910" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-add" stroke-width="5"/>
    <text x="945" y="46" class="symbol-text-add">12</text>
  </g>

  <!-- CONNECTIONS (Converging towards the sum) -->
  <!-- J'ai décalé légèrement les cibles d'arrivée (930 et 960) pour éviter que les flèches se superposent -->
  <path d="M 405 195 C 405 250, 930 220, 930 270" class="connection-add" />
  <path d="M 675 195 C 675 250, 960 210, 960 270" class="connection-add" />

  <!-- ANNOTATIONS -->
  <path d="M 910 375 L 910 390 L 980 390 L 980 375" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="945" y="425" class="annotation-add">Evaluation (Sum)</text>

</svg>
