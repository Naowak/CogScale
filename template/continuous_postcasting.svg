<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 500" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-cpost" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-cpost { stroke-width: 4px; rx: 12px; }
      .symbol-text-cpost { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-cpost { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-cpost { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-cpost { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-cpost { fill: none; stroke: #212E53; stroke-width: 3px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-cpost); opacity: 0.6; }
      .annotation-cpost { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #212E53; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1050" height="500" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-cpost">t=1</text>
  <text x="405" y="40" class="time-text-cpost">t=2</text>
  <text x="495" y="40" class="time-text-cpost">t=3</text>
  <text x="585" y="40" class="time-text-cpost">t=4</text>
  <text x="675" y="40" class="time-text-cpost">t=5</text>
  <text x="765" y="40" class="time-text-cpost">t=6</text>
  <text x="855" y="40" class="time-text-cpost">t=7</text>
  <text x="945" y="40" class="time-text-cpost">t=8</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-cpost">Input Sequence</text>
  <text x="240" y="190" class="label-sub-cpost">X (Continuous)</text>
  <text x="240" y="325" class="label-main-cpost">Target Sequence</text>
  <text x="240" y="360" class="label-sub-cpost">Y (Delayed Copy)</text>

  <!-- TOP ANNOTATIONS -->
  <path d="M 280 100 L 280 85 L 440 85 L 440 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="360" y="75" class="annotation-cpost">Delay Region</text>

  <!-- INPUT SEQUENCE (X) -->
  <g transform="translate(0, 130)">
    <rect x="280" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpost" />
    <text x="315" y="44" class="symbol-text-cpost">0.5</text>
    
    <rect x="370" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpost" />
    <text x="405" y="44" class="symbol-text-cpost">-0.2</text>

    <rect x="460" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-cpost" />
    <text x="495" y="44" class="symbol-text-cpost">0.8</text>
    
    <rect x="550" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box-cpost" />
    <text x="585" y="44" class="symbol-text-cpost">-0.4</text>
    
    <rect x="640" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpost" />
    <text x="675" y="44" class="symbol-text-cpost">0.1</text>
    
    <rect x="730" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpost" />
    <text x="765" y="44" class="symbol-text-cpost">0.9</text>

    <rect x="820" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-cpost" />
    <text x="855" y="44" class="symbol-text-cpost">-0.7</text>

    <rect x="910" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box-cpost" />
    <text x="945" y="44" class="symbol-text-cpost">0.3</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 300)">
    <!-- Pending / Delay -->
    <g opacity="0.4">
      <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-cpost" stroke-dasharray="8 4"/>
      <text x="315" y="44" class="symbol-text-cpost">0.0</text>
      
      <rect x="370" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-cpost" stroke-dasharray="8 4"/>
      <text x="405" y="44" class="symbol-text-cpost">0.0</text>
    </g>

    <!-- Restituted Signal (Delay = 2) -->
    <rect x="460" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpost" stroke-width="4"/>
    <text x="495" y="44" class="symbol-text-cpost">0.5</text>
    
    <rect x="550" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpost" stroke-width="4"/>
    <text x="585" y="44" class="symbol-text-cpost">-0.2</text>
    
    <rect x="640" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-cpost" stroke-width="4"/>
    <text x="675" y="44" class="symbol-text-cpost">0.8</text>
    
    <rect x="730" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box-cpost" stroke-width="4"/>
    <text x="765" y="44" class="symbol-text-cpost">-0.4</text>

    <rect x="820" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpost" stroke-width="4"/>
    <text x="855" y="44" class="symbol-text-cpost">0.1</text>

    <rect x="910" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpost" stroke-width="4"/>
    <text x="945" y="44" class="symbol-text-cpost">0.9</text>
  </g>

  <!-- CONNECTIONS (Crossing the delay) -->
  <path d="M 315 210 C 315 270, 495 240, 495 295" class="connection-cpost" />
  <path d="M 405 210 C 405 270, 585 240, 585 295" class="connection-cpost" />
  <path d="M 495 210 C 495 270, 675 240, 675 295" class="connection-cpost" />
  <path d="M 585 210 C 585 270, 765 240, 765 295" class="connection-cpost" />
  <path d="M 675 210 C 675 270, 855 240, 855 295" class="connection-cpost" />
  <path d="M 765 210 C 765 270, 945 240, 945 295" class="connection-cpost" />

  <!-- ANNOTATIONS -->
  <path d="M 460 390 L 460 405 L 980 405 L 980 390" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="720" y="435" class="annotation-cpost">Evaluation (Continuous Copy)</text>

</svg>
