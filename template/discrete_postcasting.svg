<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 500" width="100%" height="100%">
  <defs>
    <marker id="arrowhead3" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box3 { stroke-width: 4px; rx: 12px; }
      .symbol-text3 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main3 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub3 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text3 { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection3 { fill: none; stroke: #212E53; stroke-width: 4px; stroke-dasharray: 6 4; marker-end: url(#arrowhead3); opacity: 0.6; }
      .annotation3 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #212E53; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1050" height="500" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="70" class="time-text3">t=1</text>
  <text x="405" y="70" class="time-text3">t=2</text>
  <text x="495" y="70" class="time-text3">t=3</text>
  <text x="585" y="70" class="time-text3">t=4</text>
  <text x="675" y="70" class="time-text3">t=5</text>
  <text x="765" y="70" class="time-text3">t=6</text>
  <text x="855" y="70" class="time-text3">t=7</text>
  <text x="945" y="70" class="time-text3">t=8</text>

  <!-- LEFT LABELS -->
  <text x="240" y="130" class="label-main3">Input Sequence</text>
  <text x="240" y="165" class="label-sub3">X (Source)</text>
  <text x="240" y="330" class="label-main3">Target Sequence</text>
  <text x="240" y="365" class="label-sub3">Y (Shifted)</text>

  <!-- INPUT SEQUENCE (X) -->
  <g transform="translate(0, 90)">
    <!-- B: Saumon (#EBACA2) -->
    <rect x="280" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box3" />
    <text x="315" y="46" class="symbol-text3">B</text>
    <!-- C: Sauge (#BED3C3) -->
    <rect x="370" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box3" />
    <text x="405" y="46" class="symbol-text3">C</text>
    <!-- D: Lavande (#AFA4CE) -->
    <rect x="460" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box3" />
    <text x="495" y="46" class="symbol-text3">D</text>
    <!-- A: Bleu (#8CACD3) -->
    <rect x="550" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box3" />
    <text x="585" y="46" class="symbol-text3">A</text>
    <!-- B: Saumon -->
    <rect x="640" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box3" />
    <text x="675" y="46" class="symbol-text3">B</text>
    <!-- B: Saumon -->
    <rect x="730" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box3" />
    <text x="765" y="46" class="symbol-text3">B</text>
    <!-- C: Sauge -->
    <rect x="820" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box3" />
    <text x="855" y="46" class="symbol-text3">C</text>
    <!-- A: Bleu -->
    <rect x="910" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box3" />
    <text x="945" y="46" class="symbol-text3">A</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 290)">
    <!-- Padding 0: Gris clair -->
    <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box3" stroke-dasharray="8 4" />
    <text x="315" y="46" class="symbol-text3" fill="#8CACD3">0</text>
    <rect x="370" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box3" stroke-dasharray="8 4" />
    <text x="405" y="46" class="symbol-text3" fill="#8CACD3">0</text>
    <rect x="460" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box3" stroke-dasharray="8 4" />
    <text x="495" y="46" class="symbol-text3" fill="#8CACD3">0</text>

    <!-- B: Saumon -->
    <rect x="550" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box3" />
    <text x="585" y="46" class="symbol-text3">B</text>
    <!-- C: Sauge -->
    <rect x="640" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box3" />
    <text x="675" y="46" class="symbol-text3">C</text>
    <!-- D: Lavande -->
    <rect x="730" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box3" />
    <text x="765" y="46" class="symbol-text3">D</text>
    <!-- A: Bleu -->
    <rect x="820" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box3" />
    <text x="855" y="46" class="symbol-text3">A</text>
    <!-- B: Saumon -->
    <rect x="910" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box3" />
    <text x="945" y="46" class="symbol-text3">B</text>
  </g>

  <!-- CONNECTIONS -->
  <path d="M 315 170 C 315 235, 585 235, 585 280" class="connection3" />
  <path d="M 405 170 C 405 235, 675 235, 675 280" class="connection3" />
  <path d="M 495 170 C 495 235, 765 235, 765 280" class="connection3" />
  <path d="M 585 170 C 585 235, 855 235, 855 280" class="connection3" />
  <path d="M 675 170 C 675 235, 945 235, 945 280" class="connection3" />

  <!-- ANNOTATIONS -->
  <path d="M 280 380 L 280 395 L 530 395 L 530 380" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="405" y="435" class="annotation3">Delay Region (Padding)</text>
  <path d="M 550 380 L 550 395 L 980 395 L 980 380" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="765" y="435" class="annotation3">Evaluation Timesteps</text>

</svg>
