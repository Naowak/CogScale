<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 500" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-induc" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-induc { stroke-width: 4px; rx: 12px; }
      .symbol-text-induc { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-induc { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-induc { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-induc { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-induc { fill: none; stroke: #212E53; stroke-width: 4px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-induc); opacity: 0.6; }
      .annotation-induc { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #212E53; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1050" height="500" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-induc">t=1</text>
  <text x="405" y="40" class="time-text-induc">t=2</text>
  <text x="495" y="40" class="time-text-induc">t=3</text>
  <text x="585" y="40" class="time-text-induc">t=4</text>
  <text x="675" y="40" class="time-text-induc">t=5</text>
  <text x="765" y="40" class="time-text-induc">t=6</text>
  <text x="855" y="40" class="time-text-induc">t=7</text>
  <text x="945" y="40" class="time-text-induc">t=8</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-induc">Input Sequence</text>
  <text x="240" y="190" class="label-sub-induc">X (Repeated Sequence)</text>
  <text x="240" y="325" class="label-main-induc">Target Sequence</text>
  <text x="240" y="360" class="label-sub-induc">Y (Predict Next)</text>

  <!-- TOP ANNOTATIONS -->
  <path d="M 280 100 L 280 85 L 620 85 L 620 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="450" y="75" class="annotation-induc">First Half (Context)</text>
  
  <path d="M 640 100 L 640 85 L 980 85 L 980 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="810" y="75" class="annotation-induc">Second Half (Repeated)</text>

  <!-- INPUT SEQUENCE (X) -->
  <g transform="translate(0, 130)">
    <!-- First Half -->
    <rect x="280" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-induc" />
    <text x="315" y="46" class="symbol-text-induc">A</text>
    
    <rect x="370" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-induc" />
    <text x="405" y="46" class="symbol-text-induc">B</text>

    <rect x="460" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-induc" />
    <text x="495" y="46" class="symbol-text-induc">C</text>
    
    <rect x="550" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box-induc" />
    <text x="585" y="46" class="symbol-text-induc">D</text>
    
    <!-- Second Half -->
    <rect x="640" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-induc" />
    <text x="675" y="46" class="symbol-text-induc">A</text>
    
    <rect x="730" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-induc" />
    <text x="765" y="46" class="symbol-text-induc">B</text>

    <rect x="820" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-induc" />
    <text x="855" y="46" class="symbol-text-induc">C</text>

    <rect x="910" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box-induc" />
    <text x="945" y="46" class="symbol-text-induc">D</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 300)">
    <!-- 0 (Not evaluated in first half) -->
    <g opacity="0.4">
      <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-induc" stroke-dasharray="8 4"/>
      <rect x="370" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-induc" stroke-dasharray="8 4"/>
      <rect x="460" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-induc" stroke-dasharray="8 4"/>
      <rect x="550" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-induc" stroke-dasharray="8 4"/>
    </g>

    <!-- Predict B -->
    <rect x="640" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-induc" />
    <text x="675" y="46" class="symbol-text-induc">B</text>

    <!-- Predict C -->
    <rect x="730" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-induc" />
    <text x="765" y="46" class="symbol-text-induc">C</text>

    <!-- Predict D -->
    <rect x="820" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box-induc" />
    <text x="855" y="46" class="symbol-text-induc">D</text>

    <!-- Padding for last element (can't predict next) -->
    <g opacity="0.4">
      <rect x="910" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-induc" stroke-dasharray="8 4"/>
    </g>
  </g>

  <!-- CONNECTIONS (Induction Head Copy Mechanism) -->
  <!-- Copying B from past context to current target -->
  <path d="M 405 210 C 405 280, 675 220, 675 285" class="connection-induc" />
  <!-- Copying C -->
  <path d="M 495 210 C 495 260, 765 220, 765 285" class="connection-induc" />
  <!-- Copying D -->
  <path d="M 585 210 C 585 240, 855 220, 855 285" class="connection-induc" />

  <!-- ANNOTATIONS -->
  <path d="M 640 390 L 640 405 L 890 405 L 890 390" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="765" y="435" class="annotation-induc">Evaluation (Tokens t+1)</text>

</svg>
