<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-chaos" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-mini { stroke-width: 3px; rx: 6px; }
      .symbol-text-mini { font-family: 'Courier New', Courier, monospace; font-size: 14px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-chaos { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-chaos { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-chaos { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-chaos { fill: none; stroke: #212E53; stroke-width: 3px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-chaos); opacity: 0.6; }
      .annotation-chaos { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #212E53; text-anchor: middle; }
    </style>
  </defs>

  <rect width="950" height="550" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-chaos">t=1</text>
  <text x="405" y="40" class="time-text-chaos">t=2</text>
  <text x="495" y="40" class="time-text-chaos">t=3</text>
  <text x="585" y="40" class="time-text-chaos">t=4</text>
  <text x="675" y="40" class="time-text-chaos">t=5</text>
  <text x="765" y="40" class="time-text-chaos">t=6</text>
  <text x="855" y="40" class="time-text-chaos">t=7</text>

  <!-- LEFT LABELS -->
