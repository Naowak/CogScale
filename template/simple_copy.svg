<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 500" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-copy" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-copy { stroke-width: 4px; rx: 12px; }
      .symbol-text-copy { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-copy { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-copy { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-copy { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-copy { fill: none; stroke: #212E53; stroke-width: 4px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-copy); opacity: 0.6; }
      .annotation-copy { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #212E53; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1050" height="500" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-copy">t=1</text>
  <text x="405" y="40" class="time-text-copy">t=2</text>
  <text x="495" y="40" class="time-text-copy">t=3</text>
  <text x="585" y="40" class="time-text-copy">t=4</text>
  <text x="675" y="40" class="time-text-copy">t=5</text>
  <text x="765" y="40" class="time-text-copy">t=6</text>
  <text x="855" y="40" class="time-text-copy">t=7</text>
  <text x="945" y="40" class="time-text-copy">t=8</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-copy">Input Sequence</text>
  <text x="240" y="190" class="label-sub-copy">X (Memorize &amp; Wait)</text>
  <text x="240" y="325" class="label-main-copy">Target Sequence</text>
  <text x="240" y="360" class="label-sub-copy">Y (Recall)</text>

  <!-- TOP ANNOTATIONS -->
  <path d="M 280 100 L 280 85 L 530 85 L 530 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="405" y="75" class="annotation-copy">Memorize Sequence</text>

  <path d="M 550 100 L 550 85 L 620 85 L 620 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="585" y="75" class="annotation-copy">Delay</text>

  <path d="M 640 100 L 640 85 L 710 85 L 710 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="675" y="75" class="annotation-copy">Trigger</text>

  <!-- INPUT SEQUENCE (X) -->
  <g transform="translate(0, 115)">
    <!-- A: Bleu -->
    <rect x="280" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-copy" />
    <text x="315" y="46" class="symbol-text-copy">A</text>
    
    <!-- B: Saumon -->
    <rect x="370" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-copy" />
    <text x="405" y="46" class="symbol-text-copy">B</text>

    <!-- C: Sauge -->
    <rect x="460" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-copy" />
    <text x="495" y="46" class="symbol-text-copy">C</text>
    
    <!-- DELAY 0: Gris clair -->
    <rect x="550" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4" />
    <text x="585" y="46" class="symbol-text-copy" fill="#8CACD3">0</text>

    <!-- TRIGGER T: Lavande -->
    <rect x="640" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box-copy" />
    <text x="675" y="46" class="symbol-text-copy">T</text>
    
    <!-- PADDING 0: Gris clair -->
    <rect x="730" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4" />
    <text x="765" y="46" class="symbol-text-copy" fill="#8CACD3">0</text>
    
    <!-- PADDING 0: Gris clair -->
    <rect x="820" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4" />
    <text x="855" y="46" class="symbol-text-copy" fill="#8CACD3">0</text>
    
    <!-- PADDING 0: Gris clair -->
    <rect x="910" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4" />
    <text x="945" y="46" class="symbol-text-copy" fill="#8CACD3">0</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 285)">
    <!-- 0 (Not evaluated) -->
    <g opacity="0.4">
      <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4"/>
      <text x="315" y="46" class="symbol-text-copy">0</text>
      
      <rect x="370" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4"/>
      <text x="405" y="46" class="symbol-text-copy">0</text>
      
      <rect x="460" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4"/>
      <text x="495" y="46" class="symbol-text-copy">0</text>
      
      <rect x="550" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4"/>
      <text x="585" y="46" class="symbol-text-copy">0</text>
      
      <rect x="640" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-copy" stroke-dasharray="8 4"/>
      <text x="675" y="46" class="symbol-text-copy">0</text>
    </g>

    <!-- A: Bleu (EVALUATED) -->
    <rect x="730" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-copy" />
    <text x="765" y="46" class="symbol-text-copy">A</text>

    <!-- B: Saumon (EVALUATED) -->
    <rect x="820" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-copy" />
    <text x="855" y="46" class="symbol-text-copy">B</text>

    <!-- C: Sauge (EVALUATED) -->
    <rect x="910" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-copy" />
    <text x="945" y="46" class="symbol-text-copy">C</text>
  </g>

  <!-- CONNECTIONS (Crossing the delay) -->
  <path d="M 315 195 C 315 285, 765 225, 765 270" class="connection-copy" />
  <path d="M 405 195 C 405 255, 855 225, 855 270" class="connection-copy" />
  <path d="M 495 195 C 495 225, 945 225, 945 270" class="connection-copy" />

  <!-- ANNOTATIONS -->
  <path d="M 730 375 L 730 390 L 980 390 L 980 375" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="855" y="425" class="annotation-copy">Evaluation (Copy)</text>

</svg>
