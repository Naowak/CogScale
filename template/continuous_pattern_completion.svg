<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 500" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-cpat" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-cpat { stroke-width: 4px; rx: 12px; }
      .symbol-text-cpat { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-cpat { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-cpat { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-cpat { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-cpat { fill: none; stroke: #212E53; stroke-width: 3px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-cpat); opacity: 0.6; }
      .annotation-cpat { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #212E53; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1050" height="500" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-cpat">t=1</text>
  <text x="405" y="40" class="time-text-cpat">t=2</text>
  <text x="495" y="40" class="time-text-cpat">t=3</text>
  <text x="585" y="40" class="time-text-cpat">t=4</text>
  <text x="675" y="40" class="time-text-cpat">t=5</text>
  <text x="765" y="40" class="time-text-cpat">t=6</text>
  <text x="855" y="40" class="time-text-cpat">t=7</text>
  <text x="945" y="40" class="time-text-cpat">t=8</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-cpat">Input Sequence</text>
  <text x="240" y="190" class="label-sub-cpat">X (Masked Signal)</text>
  <text x="240" y="325" class="label-main-cpat">Target Sequence</text>
  <text x="240" y="360" class="label-sub-cpat">Y (Completed Signal)</text>

  <!-- TOP ANNOTATION: BASE PATTERN -->
  <path d="M 280 100 L 280 85 L 530 85 L 530 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="405" y="75" class="annotation-cpat">Continuous Pattern</text>

  <!-- INPUT SEQUENCE (X) -->
  <!-- Pattern: [0.8, -0.4, 0.1] repeated -->
  <g transform="translate(0, 130)">
    <rect x="280" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpat" />
    <text x="315" y="44" class="symbol-text-cpat">0.8</text>
    
    <rect x="370" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpat" />
    <text x="405" y="44" class="symbol-text-cpat">-0.4</text>

    <rect x="460" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-cpat" />
    <text x="495" y="44" class="symbol-text-cpat">0.1</text>
    
    <!-- Repetition 1 -->
    <rect x="550" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpat" />
    <text x="585" y="44" class="symbol-text-cpat">0.8</text>
    
    <!-- MASKED: True value is -0.4 -->
    <rect x="640" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-cpat" stroke-dasharray="8 4" />
    <text x="675" y="44" class="symbol-text-cpat" fill="#212E53" font-size="28px">?</text>
    
    <rect x="730" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-cpat" />
    <text x="765" y="44" class="symbol-text-cpat">0.1</text>

    <!-- Repetition 2 -->
    <!-- MASKED: True value is 0.8 -->
    <rect x="820" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-cpat" stroke-dasharray="8 4" />
    <text x="855" y="44" class="symbol-text-cpat" fill="#212E53" font-size="28px">?</text>

    <rect x="910" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpat" />
    <text x="945" y="44" class="symbol-text-cpat">-0.4</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 300)">
    <!-- Not evaluated elements -->
    <g opacity="0.4">
      <rect x="280" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpat" stroke-dasharray="8 4"/>
      <text x="315" y="44" class="symbol-text-cpat">0.8</text>
      
      <rect x="370" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpat" stroke-dasharray="8 4"/>
      <text x="405" y="44" class="symbol-text-cpat">-0.4</text>
      
      <rect x="460" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-cpat" stroke-dasharray="8 4"/>
      <text x="495" y="44" class="symbol-text-cpat">0.1</text>
      
      <rect x="550" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpat" stroke-dasharray="8 4"/>
      <text x="585" y="44" class="symbol-text-cpat">0.8</text>
      
      <rect x="730" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-cpat" stroke-dasharray="8 4"/>
      <text x="765" y="44" class="symbol-text-cpat">0.1</text>

      <rect x="910" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpat" stroke-dasharray="8 4"/>
      <text x="945" y="44" class="symbol-text-cpat">-0.4</text>
    </g>

    <!-- EVALUATED (Target completions) -->
    <!-- Replaces first mask (?) -->
    <rect x="640" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cpat" stroke-width="4"/>
    <text x="675" y="44" class="symbol-text-cpat">-0.4</text>

    <!-- Replaces second mask (?) -->
    <rect x="820" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cpat" stroke-width="4"/>
    <text x="855" y="44" class="symbol-text-cpat">0.8</text>
  </g>

  <!-- CONNECTIONS (Only on masked/evaluated tokens) -->
  <path d="M 675 210 L 675 295" class="connection-cpat" />
  <path d="M 855 210 L 855 295" class="connection-cpat" />

  <!-- ANNOTATIONS -->
  <path d="M 640 390 L 640 405 L 710 405 L 710 390" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="675" y="435" class="annotation-cpat">Evaluation</text>
  
  <path d="M 820 390 L 820 405 L 890 405 L 890 390" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="855" y="435" class="annotation-cpat">Evaluation</text>

</svg>
