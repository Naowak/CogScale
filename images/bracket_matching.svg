<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 460" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-bracket" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-bracket { stroke-width: 4px; rx: 12px; }
      .symbol-text-bracket { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-bracket { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-bracket { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-bracket { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-bracket { fill: none; stroke: #212E53; stroke-width: 4px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-bracket); opacity: 0.6; }
      .annotation-bracket { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .match-arc { fill: none; stroke: #212E53; stroke-width: 3px; stroke-dasharray: 4 4; opacity: 0.7; }
    </style>
  </defs>

  <rect width="1050" height="460" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-bracket">t=1</text>
  <text x="405" y="40" class="time-text-bracket">t=2</text>
  <text x="495" y="40" class="time-text-bracket">t=3</text>
  <text x="585" y="40" class="time-text-bracket">t=4</text>
  <text x="675" y="40" class="time-text-bracket">t=5</text>
  <text x="765" y="40" class="time-text-bracket">t=6</text>
  <text x="855" y="40" class="time-text-bracket">t=7</text>
  <text x="945" y="40" class="time-text-bracket">t=8</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-bracket">Input Sequence</text>
  <text x="240" y="190" class="label-sub-bracket">X (Brackets)</text>
  <text x="240" y="325" class="label-main-bracket">Target Sequence</text>
  <text x="240" y="360" class="label-sub-bracket">Y (Validity)</text>

  <!-- TOP ANNOTATIONS (Matching Arcs) -->
  <text x="540" y="75" class="annotation-bracket">Bracket Sequence (Valid)</text>
  
  <!-- Outer brackets arc (t=1 and t=6) -->
  <path d="M 315 120 Q 540 60 765 120" class="match-arc" />
  
  <!-- Inner brackets arc (t=2 and t=3) -->
  <path d="M 405 120 Q 450 100 495 120" class="match-arc" />

  <!-- Inner brackets arc (t=4 and t=5) -->
  <path d="M 585 120 Q 630 100 675 120" class="match-arc" />

  <!-- INPUT SEQUENCE (X) -->
  <g transform="translate(0, 130)">
    <!-- ( : Bleu -->
    <rect x="280" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-bracket" />
    <text x="315" y="46" class="symbol-text-bracket">(</text>
    
    <!-- ( : Bleu -->
    <rect x="370" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-bracket" />
    <text x="405" y="46" class="symbol-text-bracket">(</text>

    <!-- ) : Saumon -->
    <rect x="460" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-bracket" />
    <text x="495" y="46" class="symbol-text-bracket">)</text>
    
    <!-- ( : Bleu -->
    <rect x="550" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-bracket" />
    <text x="585" y="46" class="symbol-text-bracket">(</text>

    <!-- ) : Saumon -->
    <rect x="640" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-bracket" />
    <text x="675" y="46" class="symbol-text-bracket">)</text>

    <!-- ) : Saumon -->
    <rect x="730" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-bracket" />
    <text x="765" y="46" class="symbol-text-bracket">)</text>
    
    <!-- TRIGGER T -->
    <rect x="820" y="0" width="70" height="70" fill="#ecf29a" stroke="#c9cc88" class="box-bracket" />
    <text x="855" y="46" class="symbol-text-bracket" fill="#212E53">T</text>
    
    <!-- PADDING (0) -->
    <rect x="910" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-bracket" stroke-dasharray="8 4" />
    <text x="945" y="46" class="symbol-text-bracket" fill="#8CACD3">0</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 300)">
    <!-- 0 (Not evaluated / Pending) -->
    <g opacity="0.4">
      <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-bracket" stroke-dasharray="8 4"/>
      <text x="315" y="46" class="symbol-text-bracket">0</text>
      
      <rect x="370" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-bracket" stroke-dasharray="8 4"/>
      <text x="405" y="46" class="symbol-text-bracket">0</text>
      
      <rect x="460" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-bracket" stroke-dasharray="8 4"/>
      <text x="495" y="46" class="symbol-text-bracket">0</text>

      <rect x="550" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-bracket" stroke-dasharray="8 4"/>
      <text x="585" y="46" class="symbol-text-bracket">0</text>

      <rect x="640" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-bracket" stroke-dasharray="8 4"/>
      <text x="675" y="46" class="symbol-text-bracket">0</text>

      <rect x="730" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-bracket" stroke-dasharray="8 4"/>
      <text x="765" y="46" class="symbol-text-bracket">0</text>

      <rect x="820" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-bracket" stroke-dasharray="8 4"/>
      <text x="855" y="46" class="symbol-text-bracket">0</text>
    </g>

    <!-- 1: Sauge (EVALUATED - Valid) -->
    <rect x="910" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-bracket" stroke-width="5"/>
    <text x="945" y="46" class="symbol-text-bracket">1</text>
  </g>

  <!-- CONNECTIONS -->
  <!-- Trigger leads to evaluation -->
  <path d="M 855 210 C 855 260, 945 240, 945 285" class="connection-bracket" />

  <!-- ANNOTATIONS -->
  <path d="M 910 390 L 910 405 L 980 405 L 980 390" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="945" y="440" class="annotation-bracket">Evaluation</text>

</svg>
