<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 450" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-sinus" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-cont { stroke-width: 4px; rx: 12px; }
      .symbol-text-cont { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-cont { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-cont { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-cont { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-cont { fill: none; stroke: #212E53; stroke-width: 3px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-sinus); opacity: 0.6; }
      .annotation-cont { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #212E53; text-anchor: middle; }
    </style>
  </defs>

  <rect width="950" height="500" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-cont">t=1</text>
  <text x="405" y="40" class="time-text-cont">t=2</text>
  <text x="495" y="40" class="time-text-cont">t=3</text>
  <text x="585" y="40" class="time-text-cont">t=4</text>
  <text x="675" y="40" class="time-text-cont">t=5</text>
  <text x="765" y="40" class="time-text-cont">t=6</text>
  <text x="855" y="40" class="time-text-cont">t=7</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-cont">Input Sequence</text>
  <text x="240" y="190" class="label-sub-cont">X (Continuous Signal)</text>
  <text x="240" y="325" class="label-main-cont">Target Sequence</text>
  <text x="240" y="360" class="label-sub-cont">Y (Forecast t+1)</text>

  <!-- TOP ANNOTATION -->
  <path d="M 280 100 L 280 85 L 890 85 L 890 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="585" y="75" class="annotation-cont">Single Continuous Sinusoidal Signal</text>

  <!-- INPUT SEQUENCE (X) -->
  <g transform="translate(0, 130)">
    <rect x="280" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cont" />
    <text x="315" y="44" class="symbol-text-cont">0.0</text>
    
    <rect x="370" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cont" />
    <text x="405" y="44" class="symbol-text-cont">0.6</text>

    <rect x="460" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cont" />
    <text x="495" y="44" class="symbol-text-cont">1.0</text>
    
    <rect x="550" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cont" />
    <text x="585" y="44" class="symbol-text-cont">0.6</text>
    
    <rect x="640" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cont" />
    <text x="675" y="44" class="symbol-text-cont">0.0</text>
    
    <rect x="730" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cont" />
    <text x="765" y="44" class="symbol-text-cont">-0.6</text>

    <rect x="820" y="0" width="70" height="70" fill="#8CACD3" stroke="#7798C0" class="box-cont" />
    <text x="855" y="44" class="symbol-text-cont">-1.0</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 300)">
    <!-- Y = X shifted by 1 -->
    <rect x="280" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cont" stroke-width="4"/>
    <text x="315" y="44" class="symbol-text-cont">0.6</text>
    
    <rect x="370" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cont" stroke-width="4"/>
    <text x="405" y="44" class="symbol-text-cont">1.0</text>

    <rect x="460" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cont" stroke-width="4"/>
    <text x="495" y="44" class="symbol-text-cont">0.6</text>
    
    <rect x="550" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cont" stroke-width="4"/>
    <text x="585" y="44" class="symbol-text-cont">0.0</text>
    
    <rect x="640" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cont" stroke-width="4"/>
    <text x="675" y="44" class="symbol-text-cont">-0.6</text>
    
    <rect x="730" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cont" stroke-width="4"/>
    <text x="765" y="44" class="symbol-text-cont">-1.0</text>

    <rect x="820" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-cont" stroke-width="4"/>
    <text x="855" y="44" class="symbol-text-cont">-0.6</text>
  </g>

  <!-- CONNECTIONS (Showing the 1-step forecast relationship) -->
  <!-- Target at t=1 is X at t=2 -->
  <path d="M 405 205 L 315 295" class="connection-cont" />
  <path d="M 495 205 L 405 295" class="connection-cont" />
  <path d="M 585 205 L 495 295" class="connection-cont" />
  <path d="M 675 205 L 585 295" class="connection-cont" />
  <path d="M 765 205 L 675 295" class="connection-cont" />
  <path d="M 855 205 L 765 295" class="connection-cont" />

  <!-- ANNOTATIONS -->
  <path d="M 280 390 L 280 405 L 890 405 L 890 390" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="585" y="435" class="annotation-cont">Evaluation at every timestep</text>

</svg>
