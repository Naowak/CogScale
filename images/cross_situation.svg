<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 480" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-csl" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#212E53" />
    </marker>
    <style>
      .box-csl { stroke-width: 4px; rx: 12px; }
      .symbol-text-csl { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .label-main-csl { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #212E53; text-anchor: end; }
      .label-sub-csl { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 22px; font-weight: normal; fill: #8CACD3; text-anchor: end; }
      .time-text-csl { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: bold; fill: #8CACD3; text-anchor: middle; }
      .connection-csl { fill: none; stroke: #212E53; stroke-width: 4px; stroke-dasharray: 6 4; marker-end: url(#arrowhead-csl); opacity: 0.6; }
      .annotation-csl { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #212E53; text-anchor: middle; }
      .small-badge { fill: #212E53; rx: 4px; }
      .badge-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #FFFFFF; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1050" height="480" fill="#FFFFFF" />

  <!-- TIME AXIS -->
  <text x="315" y="40" class="time-text-csl">t=1</text>
  <text x="405" y="40" class="time-text-csl">t=2</text>
  <text x="495" y="40" class="time-text-csl">t=3</text>
  <text x="585" y="40" class="time-text-csl">t=4</text>
  <text x="675" y="40" class="time-text-csl">t=5</text>
  <text x="765" y="40" class="time-text-csl">t=6</text>
  <text x="855" y="40" class="time-text-csl">t=7</text>
  <text x="945" y="40" class="time-text-csl">t=8</text>

  <!-- LEFT LABELS -->
  <text x="240" y="155" class="label-main-csl">Input Sequence</text>
  <text x="240" y="190" class="label-sub-csl">X (Sentence)</text>
  <text x="240" y="325" class="label-main-csl">Target Sequence</text>
  <text x="240" y="360" class="label-sub-csl">Y (Combined Roles)</text>

  <!-- TOP ANNOTATIONS -->
  <path d="M 280 100 L 280 85 L 530 85 L 530 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="405" y="75" class="annotation-csl">Situation 1</text>

  <path d="M 550 100 L 550 85 L 620 85 L 620 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="585" y="75" class="annotation-csl">Link</text>

  <path d="M 640 100 L 640 85 L 890 85 L 890 100" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="765" y="75" class="annotation-csl">Situation 2</text>

  <!-- INPUT SEQUENCE (X) -->
  <!-- Grammar: Det -> Color -> Object -> Conjunction -> Det -> Color -> Object -> EOS -->
  <g transform="translate(0, 130)">
    <!-- a: Det -->
    <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" />
    <text x="315" y="42" class="symbol-text-csl" fill="#8CACD3">a</text>
    
    <!-- blue: Color -->
    <rect x="370" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-csl" />
    <text x="405" y="42" class="symbol-text-csl">blue</text>

    <!-- glass: Object -->
    <rect x="460" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-csl" />
    <text x="495" y="42" class="symbol-text-csl">glass</text>
    
    <!-- and: Conjunction -->
    <rect x="550" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" />
    <text x="585" y="42" class="symbol-text-csl" fill="#8CACD3">and</text>
    
    <!-- a: Det -->
    <rect x="640" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" />
    <text x="675" y="42" class="symbol-text-csl" fill="#8CACD3">a</text>
    
    <!-- red: Color -->
    <rect x="730" y="0" width="70" height="70" fill="#EBACA2" stroke="#D6978D" class="box-csl" />
    <text x="765" y="42" class="symbol-text-csl">red</text>

    <!-- cup: Object -->
    <rect x="820" y="0" width="70" height="70" fill="#BED3C3" stroke="#A8C0AD" class="box-csl" />
    <text x="855" y="42" class="symbol-text-csl">cup</text>

    <!-- . (EOS/Trigger) -->
    <rect x="910" y="0" width="70" height="70" fill="#ecf29a" stroke="#c9cc88" class="box-csl" />
    <text x="945" y="42" class="symbol-text-csl" font-size="28px">.</text>
  </g>

  <!-- TARGET SEQUENCE (Y) -->
  <g transform="translate(0, 300)">
    <!-- 0 (Not evaluated during the sentence) -->
    <g opacity="0.4">
      <rect x="280" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" stroke-dasharray="8 4"/>
      <text x="315" y="42" class="symbol-text-csl">0</text>
      
      <rect x="370" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" stroke-dasharray="8 4"/>
      <text x="405" y="42" class="symbol-text-csl">0</text>
      
      <rect x="460" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" stroke-dasharray="8 4"/>
      <text x="495" y="42" class="symbol-text-csl">0</text>
      
      <rect x="550" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" stroke-dasharray="8 4"/>
      <text x="585" y="42" class="symbol-text-csl">0</text>

      <rect x="640" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" stroke-dasharray="8 4"/>
      <text x="675" y="42" class="symbol-text-csl">0</text>

      <rect x="730" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" stroke-dasharray="8 4"/>
      <text x="765" y="42" class="symbol-text-csl">0</text>

      <rect x="820" y="0" width="70" height="70" fill="#F4F6F6" stroke="#BDC3C7" class="box-csl" stroke-dasharray="8 4"/>
      <text x="855" y="42" class="symbol-text-csl">0</text>
    </g>

    <!-- Multi-hot output box (EVALUATED) -->
    <rect x="910" y="0" width="70" height="70" fill="#AFA4CE" stroke="#9C90BD" class="box-csl" stroke-width="5"/>
    <text x="945" y="42" class="symbol-text-csl" fill="#FFFFFF">Y</text>
  </g>

  <!-- CONNECTIONS (Aggregating semantic information to the final output) -->
  <!-- "blue" -->
  <path d="M 405 200 C 405 290, 915 260, 915 295" class="connection-csl" />
  <!-- "glass" -->
  <path d="M 495 200 C 495 260, 935 240, 935 295" class="connection-csl" />
  <!-- "red" -->
  <path d="M 765 200 C 765 260, 955 240, 955 295" class="connection-csl" />
  <!-- "cup" -->
  <path d="M 855 200 C 855 260, 975 240, 975 295" class="connection-csl" />

  <!-- ANNOTATIONS -->
  <path d="M 910 390 L 910 405 L 980 405 L 980 390" fill="none" stroke="#212E53" stroke-width="4" stroke-linejoin="round" />
  <text x="945" y="435" class="annotation-csl">Evaluation</text>
  <text x="945" y="460" class="annotation-csl">(Multi-Classes)</text>

</svg>
